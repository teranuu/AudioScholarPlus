# ===================================================================
# Springboot Configuration
# ===================================================================
spring.application.name=audioscholar
# Defaults to local for developer convenience; set SPRING_PROFILES_ACTIVE in deployment environments.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}
# Set maximum file size (Keep as is)
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB
app.temp-file-dir=${TEMP_FILE_DIR:${java.io.tmpdir}/audioscholar_temp_uploads}
#Loggings
# Example: Set logging level for your application's packages to DEBUG
logging.level.edu.cit.audioscholar=DEBUG
# Example: Set logging level for Spring framework security to INFO
logging.level.org.springframework.security=INFO
# Enable DEBUG logging for all packages
logging.level.root=INFO
logging.level.org.springframework=INFO
# Set log file to output in the root directory
logging.file.name=./springboot.log
# Enable log rotation to prevent stale logs
logging.logback.rollingpolicy.clean-history-on-start=true
logging.logback.rollingpolicy.max-history=7
logging.logback.rollingpolicy.max-file-size=100MB
logging.logback.rollingpolicy.total-size-cap=1GB
# Use both size and time-based rolling for better log management
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
# Configure public callback/origin URLs via APP_CORS_ALLOWED_ORIGINS.

spring.cache.cache-names=uptimeRobotMonitors,audioMetadataByUser,audioMetadataById,jwtDenylistCache,usersById,githubApiResults

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/audioscholar}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true

# ===================================================================
# Actuator / Management Configuration
# ===================================================================
# Safely expose only health/info over HTTP; health details/components stay hidden.
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.endpoint.health.show-components=never
management.endpoint.health.probes.enabled=true
management.info.env.enabled=true
info.app.name=${spring.application.name}
info.app.description=AudioScholar backend API

# ===================================================================
# Robust Task Retry Configuration
# ===================================================================
# Bounded retry defaults for listener-side external-service operations.
app.robust-task.max-attempts=${ROBUST_TASK_MAX_ATTEMPTS:10}
app.robust-task.initial-delay-ms=${ROBUST_TASK_INITIAL_DELAY_MS:2000}
app.robust-task.max-delay-ms=${ROBUST_TASK_MAX_DELAY_MS:60000}

uptimerobot.api.key=${UPTIME_ROBOT_API}
uptimerobot.api.base-url=https://api.uptimerobot.com/v2


# ===================================================================
# Firebase Configuration
# ===================================================================
firebase.web.api-key=${FIREBASE_WEB_API_KEY:}
firebase.database.url=${FIREBASE_DATABASE_URL:}
firebase.project-id=${FIREBASE_PROJECT_ID:}
# firebase-service-account.json is EXCLUDED from the packaged jar (see pom.xml resources/excludes).
# For local dev only — place the JSON in src/main/resources/.
# Production/staging deployments MUST use GOOGLE_APPLICATION_CREDENTIALS env var pointing to a filesystem path.
firebase.service-account.file=firebase-service-account.json
firebase.firestore.collection.audiometadata=audio_metadata
firebase.firestore.collection.summaries=summaries
firebase.firestore.collection.recommendations=learning_recommendations
# ===================================================================
# Supabase Storage Configuration
# ===================================================================
supabase.url=${SUPABASE_URL:}
supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY:}
supabase.storage.bucket=${SUPABASE_STORAGE_BUCKET:audioscholar}
# ===================================================================
# Youtube Configuration
# ===================================================================
youtube.api.key=${YOUTUBE_API_KEY}
# ===================================================================
# Google Configuration
# ===================================================================
# Google AI API Key (Keep as is)
google.ai.api.key=${GOOGLE_AI_API_KEY}
google.oauth.web.client.id=${GOOGLE_CLIENT_ID:}
google.oauth.android.client.id=${GOOGLE_ANDROID_CLIENT_ID:}
# Google Provider
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# Github Configuration
# ===================================================================
# GitHub Provider
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET}
spring.security.oauth2.client.registration.github.scope=read:user,user:email
# GitHub API Endpoints
github.api.url.token=https://github.com/login/oauth/access_token
github.api.url.user=https://api.github.com/user
github.api.url.emails=https://api.github.com/user/emails


# ===================================================================
# RabbitMQ Configuration (disabled for portfolio demo by default)
# APP_RABBITMQ_ENABLED=true enables listener beans and re-enables the Rabbit health indicator.
app.rabbitmq.enabled=${APP_RABBITMQ_ENABLED:false}
management.health.rabbit.enabled=${app.rabbitmq.enabled:false}

# ===================================================================
# JWT Configuration
# ===================================================================
app.jwt.secret=${JWT_SECRET}
# Token validity in milliseconds (e.g., 1 hour = 3600000, 1 day = 86400000)
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}
# ===================================================================
# Bucket4j Rate Limiting Configuration
# ===================================================================
bucket4j.enabled=true
# Filter 0: Rate limit login/oauth attempts (Stateful Chain)
# Apply this filter first (lower order number)
bucket4j.filters[0].id=login-oauth-limit
bucket4j.filters[0].filter-method=servlet
bucket4j.filters[0].filter-order=1
# Use Ant-style patterns for multiple paths
bucket4j.filters[0].url=/login/**,/oauth2/**
bucket4j.filters[0].rate-limits[0].cache-key='getRemoteAddr()'
bucket4j.filters[0].rate-limits[0].bandwidths[0].capacity=10
bucket4j.filters[0].rate-limits[0].bandwidths[0].time=1
bucket4j.filters[0].rate-limits[0].bandwidths[0].unit=MINUTES
# Use the custom response you defined
bucket4j.filters[0].http-response-body={"message": "Too many login attempts. Please try again later.", "status": 429}
bucket4j.filters[0].http-status-code=TOO_MANY_REQUESTS
# Filter 1: Rate limit audio uploads (Stateless Chain)
# Apply this filter next if the first didn't match
bucket4j.filters[1].id=audio-upload-limit
bucket4j.filters[1].filter-method=servlet
bucket4j.filters[1].filter-order=2
bucket4j.filters[1].url=/api/audio/upload
bucket4j.filters[1].rate-limits[0].cache-key='getRemoteAddr()'
bucket4j.filters[1].rate-limits[0].bandwidths[0].capacity=30
bucket4j.filters[1].rate-limits[0].bandwidths[0].time=1
bucket4j.filters[1].rate-limits[0].bandwidths[0].unit=HOURS
# Use the custom response you defined
bucket4j.filters[1].http-response-body={"message": "Too many upload requests. Please try again later.", "status": 429}
bucket4j.filters[1].http-status-code=TOO_MANY_REQUESTS

# ===================================================================
# AI Provider Configuration
# ===================================================================
ai.provider=${AI_PROVIDER:gemini}
ai.openai-compatible.enabled=${AI_OPENAI_COMPATIBLE_ENABLED:false}
ai.openai-compatible.base-url=${AI_OPENAI_COMPATIBLE_BASE_URL:https://opencode.ai/zen/v1}
ai.openai-compatible.api-key=${AI_OPENAI_COMPATIBLE_API_KEY:}
ai.openai-compatible.chat-model=${AI_OPENAI_COMPATIBLE_CHAT_MODEL:big-pickle}
ai.openai-compatible.retry.max-attempts=${AI_OPENAI_COMPATIBLE_RETRY_MAX_ATTEMPTS:3}
ai.openai-compatible.retry.initial-backoff-ms=${AI_OPENAI_COMPATIBLE_RETRY_INITIAL_BACKOFF_MS:1000}
ai.openai-compatible.retry.max-backoff-ms=${AI_OPENAI_COMPATIBLE_RETRY_MAX_BACKOFF_MS:60000}
# --- Gemini Smart Rotation Configuration ---
gemini.model-hierarchy=gemini-2.5-pro,gemini-flash-latest,gemini-flash-lite-latest,gemini-2.5-flash,gemini-2.5-flash-lite,gemini-2.0-flash,gemini-2.0-flash-lite
gemini.rotation.base-backoff-ms=2000
gemini.rotation.max-backoff-ms=60000
gemini.rotation.backoff-multiplier=2.0
gemini.api.model.transcription=gemini-2.5-flash
gemini.api.model.summarization=gemini-2.5-flash
# ===================================================================
# Dynamic Key Rotation Configuration
# ===================================================================
gemini.api.keys=${GEMINI_API_KEYS:}
app.async.core-pool-size=${APP_ASYNC_CORE_POOL_SIZE:2}
app.async.max-pool-size=${APP_ASYNC_MAX_POOL_SIZE:4}
app.async.queue-capacity=${APP_ASYNC_QUEUE_CAPACITY:20}
# ===================================================================
# CORS Configuration
# ===================================================================
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:8100,https://localhost:8100,capacitor://localhost,http://localhost,https://localhost,http://localhost:5173,https://localhost:5173,http://localhost:5174,https://localhost:5174,http://localhost:8080,https://localhost:8080,https://it342-g3-audioscholar.onrender.com,https://it342-g3-audioscholar-onrender-com.onrender.com,https://audioscholar.vercel.app}