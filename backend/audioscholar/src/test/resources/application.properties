# ===================================================================
# RabbitMQ Configuration for Tests (disabled by default)
# Set app.rabbitmq.enabled=true only in tests that provision RabbitMQ; this also re-enables Rabbit health.
# spring.rabbitmq.host=localhost
# spring.rabbitmq.port=5672
# spring.rabbitmq.username=guest
# spring.rabbitmq.password=guest


youtube.api.key=DUMMY_API

# ===================================================================
# Gemini Smart Rotation Configuration for Tests
# ===================================================================
gemini.model-hierarchy=gemini-pro,gemini-1.5-flash
gemini.rotation.base-backoff-ms=100
gemini.rotation.max-backoff-ms=500
gemini.rotation.backoff-multiplier=1.5
gemini.api.model.transcription=gemini-pro
gemini.api.model.summarization=gemini-pro

ai.provider=gemini
ai.openai-compatible.enabled=false
ai.openai-compatible.api-key=
app.async.core-pool-size=1
app.async.max-pool-size=1
app.async.queue-capacity=2
# ===================================================================
# Logging Configuration for Tests (Optional)
# ===================================================================
logging.level.edu.cit.audioscholar=DEBUG
logging.level.org.springframework.security=INFO
logging.level.root=INFO
# Reset log file on application startup
logging.file.name=springbootbackend-test.log
logging.logback.rollingpolicy.clean-history-on-start=true
logging.logback.rollingpolicy.max-history=1
logging.logback.rollingpolicy.max-file-size=100MB